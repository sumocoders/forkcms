imports:
    - { resource: commands.yml }

services:
    formbuilder.submitted.mailer:
        class: Frontend\Modules\FormBuilder\EventListener\FormBuilderSubmittedMailSubscriber
        arguments:
            - "@mailer.mailer"
            - '@Common\Mailer\EmailFactory'
        tags:
            - {
                name: kernel.event_listener,
                event: Frontend\Modules\FormBuilder\Event\FormBuilderSubmittedEvent,
                method: onFormSubmitted
            }
