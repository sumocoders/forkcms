services:
  mailmotor.listener.settings_saved:
    class: Backend\Modules\Mailmotor\EventListener\SettingsSavedListener
    arguments:
      - "%kernel.cache_dir%"
    tags:
      - {
          name: kernel.event_listener,
          event: Backend\Modules\Mailmotor\Domain\Settings\Event\SettingsSavedEvent,
          method: onSettingsSavedEvent
      }
  mailmotor.listener.subscribed:
    class: Frontend\Modules\Mailmotor\EventListener\NewNotImplementedMailingListSubscription
    arguments:
        - "@mailer.mailer"
        - '@Common\Mailer\EmailFactory'
    tags:
      - {
          name: kernel.event_listener,
          event: Frontend\Modules\Mailmotor\Domain\Subscription\Event\NotImplementedSubscribedEvent,
          method: onNotImplementedSubscribedEvent
      }
  mailmotor.listener.unsubscribed:
    class: Frontend\Modules\Mailmotor\EventListener\NewNotImplementedMailingListUnsubscription
    arguments:
        - "@mailer.mailer"
        - '@Common\Mailer\EmailFactory'
    tags:
      - {
          name: kernel.event_listener,
          event: Frontend\Modules\Mailmotor\Domain\Subscription\Event\NotImplementedUnsubscribedEvent,
          method: onNotImplementedUnsubscribedEvent
      }

  Frontend\Modules\Mailmotor\EventListener\FormBuilderSubmittedMailmotorSubscriber:
    arguments:
        - "@fork.settings"
        - "@mailmotor.subscriber"
    tags:
        - {
            name: kernel.event_listener,
            event: Frontend\Modules\FormBuilder\Event\FormBuilderSubmittedEvent,
            method: onFormSubmitted
        }
